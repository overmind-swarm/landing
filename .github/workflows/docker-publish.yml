name: Build and Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_NAME: landing
  REGISTRY: registry.overmind-platform.svc:5000
  DEPLOY_NAMESPACE: overmind-system
  REGISTRY_SVC: svc/registry
  REGISTRY_NAMESPACE: overmind-platform
  LOCAL_PORT: "5050"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from conventional commits
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No semver tag found, using v0.0.0 as base"
            LATEST_TAG="v0.0.0"
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "Commits since tag:"
          echo "$COMMITS"

          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          BUMP=""
          if echo "$COMMITS" | grep -qiE "^.+!:|BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:|^perf(\(.+\))?:|^refactor(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No conventional commit requires a version bump — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → v${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        if: steps.version.outputs.skip != 'true'
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: steps.version.outputs.skip != 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Build Docker image
        if: steps.version.outputs.skip != 'true'
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --label "org.opencontainers.image.version=${{ steps.version.outputs.new_version }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t localhost:${{ env.LOCAL_PORT }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }} \
            .

      - name: Push to cluster registry
        if: steps.version.outputs.skip != 'true'
        run: |
          kubectl port-forward -n ${{ env.REGISTRY_NAMESPACE }} ${{ env.REGISTRY_SVC }} ${{ env.LOCAL_PORT }}:5000 &
          PF_PID=$!
          for i in $(seq 1 30); do
            (echo > /dev/tcp/localhost/${{ env.LOCAL_PORT }}) 2>/dev/null && break
            echo "Waiting for port-forward... ($i/30)"
            sleep 1
          done
          (echo > /dev/tcp/localhost/${{ env.LOCAL_PORT }}) 2>/dev/null || { echo "Port-forward failed to start"; kill $PF_PID 2>/dev/null; exit 1; }
          docker push localhost:${{ env.LOCAL_PORT }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
          kill $PF_PID 2>/dev/null

      - name: Deploy to production
        if: steps.version.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.new_version }}"
          sed -i "s|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:[^ \"]*|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}|g" deploy/overlays/prod/kustomization.yaml
          kubectl apply -k deploy/overlays/prod/
          if ! kubectl rollout status deployment/${{ env.IMAGE_NAME }} -n ${{ env.DEPLOY_NAMESPACE }} --timeout=180s; then
            echo "Rollout failed — rolling back deployment/${{ env.IMAGE_NAME }}"
            kubectl rollout undo deployment/${{ env.IMAGE_NAME }} -n ${{ env.DEPLOY_NAMESPACE }}
            kubectl rollout status deployment/${{ env.IMAGE_NAME }} -n ${{ env.DEPLOY_NAMESPACE }} --timeout=120s || true
            exit 1
          fi

      - name: Persist image tag to repo
        # Pushes the updated prod image tag back to main. This follows the
        # same pattern as all other org repos (app, backend, etc.). The
        # "[skip ci]" suffix prevents recursive workflow triggers.
        # If branch protection is enabled later, use a PAT or GitHub App token.
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/prod/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore: update prod image tag to ${{ steps.version.outputs.new_version }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Create git tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"
